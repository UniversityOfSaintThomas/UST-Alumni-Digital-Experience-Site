<template>

         UST Alumni Footer
         Mirrors alumni.stthomas.edu:
         - Brand block (logo, address, contact, social icons)
         - 4-column navigation
         - Legal bar
         - Back to top
         ============================================================ -->
    <footer class="ust-footer" role="contentinfo">

                    </a>

                    <address class="ust-footer__address">
                        <p>University of St. Thomas, Minnesota</p>
                        <p>2115 Summit Avenue</p>
                        <p>St. Paul, Minnesota 55105 USA</p>
                    </address>

                        <li><a href={updateContactUrl}>Update your Contact Info</a></li>
                        <li>
                            <a href="https://www.stthomas.edu/registrar/alumni-former-student-information/index.html"
                               target="_blank" rel="noopener">Request a Transcript</a>
                        </li>
                    </ul>

                    <p class="ust-footer__copyright">&copy; {currentYear} University of St. Thomas, Minnesota</p>
                </div>

                <!-- Footer navigation columns -->
                <nav class="ust-footer__nav" aria-label="Footer navigation">
                    <template for:each={footerColumns} for:item="col">
                        <div key={col.id} class="ust-footer__nav-col">
                            <h3 class="ust-footer__nav-heading">{col.label}</h3>
                            <ul class="ust-footer__nav-list">
                                <template for:each={col.items} for:item="item">
                                    <li key={item.id}>
                                        <a
                                            href={item.actionValue}
                                            class="ust-footer__nav-link"
                                            data-url={item.actionValue}
                                            data-type={item.actionType}
                                            onclick={handleNavClick}>
                                            {item.label}
                                        </a>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </template>
                </nav>

            </div>
        </div>

        <!-- LEGAL BAR -->
        <div class="ust-footer__legal-bar">
            <div class="ust-footer__container ust-footer__legal-container">
                <ul class="ust-footer__legal-links">
                    <li>
                        <a href="https://stthomas.az1.qualtrics.com/jfe/form/SV_29nqe0td5nH798q"
                           target="_blank" rel="noopener">Report a Website Problem</a>
                    </li>
                    <li>
                        <a href="https://www.stthomas.edu/policies/equal-opportunity/"
                           target="_blank" rel="noopener">EO Statement</a>
                    </li>
                    <li>
                        <a href="https://www.stthomas.edu/accessibility-statement/index.html"
                           target="_blank" rel="noopener">Accessibility</a>
                    </li>
                    <li>
                        <a href="https://www.stthomas.edu/policies/online-privacy/index.html"
                           target="_blank" rel="noopener">Privacy Policy</a>
                    </li>
                    <li>

                    </li>
                </ul>
                <a href="#top" class="ust-footer__back-to-top" aria-label="Back to top of page">

                    <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" focusable="false" aria-hidden="true">
                        <path fill-rule="evenodd" d="M10 3.293 2.854 10.44a1 1 0 0 1-1.415-1.413l8-8a1 1 0 0 1 1.415 0l8 8a1 1 0 0 1-1.415 1.413L10 3.293Z"/>
