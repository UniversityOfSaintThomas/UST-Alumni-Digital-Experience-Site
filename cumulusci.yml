minimum_cumulusci_version: '4.8.0'
project:
    name: UST-Alumni-Digital-Experience-Site
    package:
        name: UST-Alumni-Digital-Experience-Site
        api_version: '66.0'
    git:
    source_format: sfdx

tasks:
    robot:
        options:
            suites: robot/UST-Alumni-Digital-Experience-Site/tests
            options:
                outputdir: robot/UST-Alumni-Digital-Experience-Site/results

    robot_testdoc:
        options:
            path: robot/UST-Alumni-Digital-Experience-Site/tests
            output: robot/UST-Alumni-Digital-Experience-Site/doc/UST-Alumni-Digital-Experience-Site_tests.html

    run_tests:
        options:
            required_org_code_coverage_percent: 75

    create_community:
        description: Deploys configuration for Development.
        class_path: cumulusci.tasks.salesforce.CreateCommunity
        options:
            name: Alumni
            description: St Thomas Alumni Community
            template: Build Your Own (LWR)
            url_path_prefix: alumni
            skip_existing: True

    create_community_network:
        description: Creates the community network for Development.
        class_path: cumulusci.tasks.salesforce.network_member_group.CreateNetworkMemberGroups
        options:
            network_name: Alumni
            profile_names:
                - Customer Community Login User

    create_community_publish:
        description: Publishes the community for Development.
        class_path: cumulusci.tasks.salesforce.PublishCommunity
        options:
            name: Alumni

    create_community_experience_cloud_bundle:
        description: Deploys Network config for community for Development.
        class_path: cumulusci.tasks.salesforce.Deploy
        options:
            namespace_inject: $project_config.project__package__namespace
            path: unpackaged/config/experiences
            unmanaged: True
            timeout: 520
            source_format: sfdx

    role_to_userUser:
        description: Give Guest User Registrant Permission Set
        class_path: cumulusci.tasks.apex.anon.AnonymousApexTask
        options:
            namespace_inject: $project_config.project__package__namespace
            apex: >
                User userUser = [SELECT Id FROM User WHERE Alias = 'UUser' LIMIT 1];
                Id seaUserRole = [SELECT Id FROM UserRole WHERE Name = 'Alumni Community Owner'].Id;
                userUser.UserRoleId = seaUserRole;
                userUser.Country = 'United States';
                update userUser;

flows:
    config_dev:
        steps:
            1.3:
                task: role_to_userUser
            3:
                task: create_community
            4:
                task: create_community_network
            5:
                task: create_community_experience_cloud_bundle
            6:
                task: create_community_publish

orgs:
    scratch:
        dev:
            days: 14
            namespaced: false